<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0e27">
    <title>SRLIENS - Update n8n URI</title>
    <link rel="icon" href="https://srlines.net/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://srlines.net/favicon.ico">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .brand-name {
            font-size: 28px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }

        .brand-name span {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            margin: 20px 0 28px 0;
        }

        .form-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .form-group label .required {
            color: #ff6b6b;
            margin-left: 2px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1);
        }

        .form-group input:focus + .input-hint {
            opacity: 1;
            transform: translateY(0);
        }

        .input-hint {
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            margin-top: 6px;
            transition: all 0.3s ease;
            opacity: 0.7;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: inherit;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn-submit.loading .spinner {
            display: block;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        #result.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #result.success {
            border-color: rgba(46, 213, 115, 0.3);
        }

        #result.error {
            border-color: rgba(255, 107, 107, 0.3);
        }

        #result .result-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        #result .result-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        #result .result-msg {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            word-break: break-all;
        }

        #result.success .result-title { color: #2ed573; }
        #result.error .result-title { color: #ff6b6b; }

        #result .result-details {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: rgba(255, 255, 255, 0.5);
        }

        .footer .heart {
            color: #ff6b6b;
            display: inline-block;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
                border-radius: 20px;
            }

            .brand-name {
                font-size: 24px;
            }

            .brand-icon {
                width: 34px;
                height: 34px;
                font-size: 16px;
            }

            .form-title {
                font-size: 18px;
            }

            .form-group input {
                padding: 12px 14px;
                font-size: 14px;
            }

            .btn-submit {
                padding: 14px;
                font-size: 15px;
            }
        }

        @media (max-width: 380px) {
            .container {
                padding: 20px 16px;
            }

            .brand-name {
                font-size: 20px;
            }

            .brand-icon {
                width: 28px;
                height: 28px;
                font-size: 13px;
            }

            .form-title {
                font-size: 16px;
            }
        }

        /* Dark mode scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Status indicators */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-dot.online {
            background: #2ed573;
            box-shadow: 0 0 10px rgba(46, 213, 115, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Branding -->
        <div class="brand">
            <div class="brand-logo">
                <div class="brand-icon">S</div>
                <div class="brand-name"><span>SRLIENS</span></div>
            </div>
            <div class="brand-sub">Automation Platform</div>
        </div>

        <div class="divider"></div>

        <!-- Form -->
        <div class="form-title">Update n8n URI</div>
        <div class="form-subtitle">Connect your n8n automation instance</div>

        <form id="n8nForm" autocomplete="off">
            <div class="form-group">
                <label for="apiToken">
                    API Token <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="apiToken" 
                    placeholder="Enter your API token" 
                    required
                    autocomplete="off"
                    spellcheck="false"
                >
                <div class="input-hint">Your authentication token from SRLIENS dashboard</div>
            </div>

            <div class="form-group">
                <label for="n8nUri">
                    n8n URI <span class="required">*</span>
                </label>
                <input 
                    type="url" 
                    id="n8nUri" 
                    placeholder="https://your-n8n-instance.com/webhook" 
                    required
                    spellcheck="false"
                >
                <div class="input-hint">Full URL of your n8n webhook endpoint</div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">🚀 Update n8n URI</span>
                <div class="spinner"></div>
            </button>
        </form>

        <!-- Result -->
        <div id="result">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-msg" id="resultMsg"></div>
            <div class="result-details" id="resultDetails"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span class="status-dot online"></span>
            <span>SRLIENS v2.0</span>
            <span style="margin: 0 8px;">•</span>
            <span>Powered by <a href="https://srlines.net" target="_blank">SRLIENS</a></span>
            <br>
            <span style="font-size: 11px; opacity: 0.6;">
                Made with <span class="heart">♥</span> for automation
            </span>
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('n8nForm');
            const apiTokenInput = document.getElementById('apiToken');
            const n8nUriInput = document.getElementById('n8nUri');
            const submitBtn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const resultMsg = document.getElementById('resultMsg');
            const resultDetails = document.getElementById('resultDetails');

            // API endpoint
            const API_URL = 'https://crm.srlines.net/api/user/update_n8n_uri';

            // Remove any "Bearer " prefix from token
            function cleanToken(token) {
                return token.replace(/^Bearer\s+/i, '').trim();
            }

            // Show result with styling
            function showResult(success, title, msg, details = null) {
                resultDiv.className = 'show ' + (success ? 'success' : 'error');
                resultIcon.textContent = success ? '✅' : '❌';
                resultTitle.textContent = title;
                resultMsg.textContent = msg;
                
                if (details) {
                    resultDetails.textContent = typeof details === 'string' ? details : JSON.stringify(details, null, 2);
                } else {
                    resultDetails.textContent = '';
                }

                // Scroll to result
                setTimeout(() => {
                    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);
            }

            // Set loading state
            function setLoading(loading) {
                if (loading) {
                    submitBtn.classList.add('loading');
                    submitBtn.disabled = true;
                } else {
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            }

            // Handle form submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const token = cleanToken(apiTokenInput.value);
                const n8nUri = n8nUriInput.value.trim();

                // Validate inputs
                if (!token) {
                    showResult(false, 'Validation Error', 'Please enter your API token');
                    apiTokenInput.focus();
                    return;
                }

                if (!n8nUri) {
                    showResult(false, 'Validation Error', 'Please enter your n8n URI');
                    n8nUriInput.focus();
                    return;
                }

                // Validate URL format
                try {
                    new URL(n8nUri);
                } catch (err) {
                    showResult(false, 'Invalid URL', 'Please enter a valid n8n URI (e.g., https://your-instance.com/webhook)');
                    n8nUriInput.focus();
                    return;
                }

                // Start loading
                setLoading(true);
                resultDiv.className = '';

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ 
                            token: token,  // Token in body
                            n8n_uri: n8nUri 
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        showResult(true, 'Success!', data.msg || 'n8n URI updated successfully', data);
                    } else {
                        // Check if it's a token error
                        if (data.logout) {
                            showResult(false, 'Session Expired', 'Your token is invalid. Please login again.', data);
                        } else {
                            showResult(false, 'Update Failed', data.msg || 'Something went wrong', data);
                        }
                    }

                } catch (error) {
                    showResult(false, 'Network Error', 'Failed to connect to server. Please check your internet connection.', {
                        error: error.message
                    });
                } finally {
                    setLoading(false);
                }
            });

            // Auto-remove "Bearer " prefix when pasting
            apiTokenInput.addEventListener('paste', function() {
                setTimeout(() => {
                    this.value = cleanToken(this.value);
                }, 10);
            });

            // Trim on blur
            apiTokenInput.addEventListener('blur', function() {
                this.value = cleanToken(this.value);
            });

            // Enter key support - already handled by form submit
            // Additional UX: Clear result on new input
            apiTokenInput.addEventListener('input', () => {
                resultDiv.className = '';
            });
            n8nUriInput.addEventListener('input', () => {
                resultDiv.className = '';
            });

            console.log('🚀 SRLIENS n8n URI Updater ready');
            console.log(`📡 API Endpoint: ${API_URL}`);
        })();
    </script>
</body>
</html>
